<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="/static/css/registro.css">
</head>
<body>
    <div class="card">
        <div class="caja-logo">
            <svg class="logo" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </div>
        <h1>Crear Cuenta </h1>
        <p>
            Completa el formulario para registrarte
        </p>
        <div>
            <form class="fomulario" action="{{ url_for('registro') }}" method="POST">
                <!-- Nombre y Apellido -->
                <div class="formulario-registro">
                    <label class="label-form">Nombre</label>
                    <div class="caja-ico-input">
                        <svg class="ico-input" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <input class="input-entry" type="text" placeholder="Joel" name="nombre">
                    </div>

                    <label class="label-form">Apellido</label>
                    <div class="caja-ico-input">
                        <svg class="ico-input" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <input class="input-entry" type="text" placeholder="Canela" name="apellido">
                    </div>

                    <label class="label-form">Correo Electrónico</label>
                    <div class="caja-ico-input">
                        <svg class="ico-input" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        <input class="input-entry" type="email" placeholder="canelajoel3@gmail.com" name="correo_electronico">
                    </div>

                    <label class="label-form">Contraseña</label>
                    <div class="caja-ico-input">
                        <svg class="ico-input" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        <input class="input-entry" type="password" placeholder="******" name="contrasena">
                    </div>

                    
                    <label class="label-form">Telefono</label>
                    <div class="caja-ico-input">
                        <svg class="ico-input" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                        <input class="input-entry" type="text" placeholder="829-915-7450" name="telefono">
                    </div>

                    <label class="label-form">Fecha de Nacimiento</label>
                    <div class="caja-ico-input">
                        <svg class="ico-input" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <input class="input-entry" type="date" placeholder="dd/mm/aaaa" name="fecha_nacimiento">
                    </div>

                    <label class="label-form">Rol</label>
                    <div class="caja-ico-input">
                        <svg class="ico-input" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <select id="rol" required name="rol">
                        <option value="">Selecciona un rol</option>
                        <option value="usuario">Usuario</option>
                    </select>
                    </div> 

                    <!-- Terminos y Condiciones-->
                    <div class="caja-terminos">
                        <input class="btn-check" type="checkbox" name="terminos">
                        <label class="label-termino">Acepto los
                            <a class="enlace" href="#">Terminos y condiciones</a>
                        </label>
                        <div class="caja-boton">
                            <button class="btn-confirmar" type="submit">Crear Cuenta</button>
                            <p class="parrafo-link">¿Ya tienes una cuenta?
                                <a class="enlace" href="/">Inicia Sesion</a>
                            </p>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
